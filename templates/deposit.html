<head>
    <meta name = "viewport" content = "width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h2>Deposit Money</h2>
        <input type="text" id="address" placeholder="enter deposit address">
        <input type="text" id="amount" placeholder="enter deposit amount">
        <button class="btn" onclick="deposit()">Deposit</button>
        <button class="btn" onclick="viewDeposit()">View Deposit</button>

        <form action="/main" method="post">
            <input type="submit" value="Main">
        
        </form>
        <p id="view_address"></p>
        <p id="view_amount"></p>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
            const contractAddress = "0x0cf5b5b9318a79ae2e41f89f8fa91c0ddc70e2b4";
            
            const contractABI = [
            {
                "inputs": [],
                "name": "checkDeposit",
                "outputs": [
                    {
                        "internalType": "address",
                        "name": "",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "_address",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "_amount",
                        "type": "uint256"
                    }
                ],
                "name": "deposit",
                "outputs": [],
                "stateMutability": "payable",
                "type": "function"
            }
        ];

        const web3 = new Web3(Web3.givenProvider);
        const contract = new web3.eth.Contract(contractABI, contractAddress);


        async function deposit() {
            const accounts = await web3.eth.requestAccounts();
            const address = document.getElementById('address').value;
            const amount = document.getElementById('amount').value;
            console.log(address, amount);

            await contract.methods.deposit(address, amount).send({ from: accounts[0] });

        }

        async function viewDeposit() {
            const result = await contract.methods.checkDeposit().call();

            document.getElementById('view_address').innerText = "Address: " + result[0];
            document.getElementById('view_amount').innerText = "Amount: " + result[1];
            console.log(address, amount);

        }
        </script>
